name: Commit refreshed directory, scan state, and postings
  run: |
    git config user.name "launchlist-bot"
    git config user.email "actions@users.noreply.github.com"

    git add data/opportunities.json
    git add data/fortune500_companies.json
    git add data/company_scan_state.json
    git add feed.xml

    git diff --cached --quiet || git commit -m "chore: refresh Fortune 500 internship scan"

    git pull --rebase --autostash origin main
    git push

on:
  workflow_dispatch:
    inputs:
      full_sweep:
        description: "Scan all 500 companies in this run"
        required: false
        default: false
        type: boolean

  schedule:
    - cron: "23 * * * *"

  push:
    branches:
      - main
    paths-ignore:
      - "launchlist-fortune500-snapshot-fix/data/opportunities.json"
      - "launchlist-fortune500-snapshot-fix/data/fortune500_companies.json"
      - "launchlist-fortune500-snapshot-fix/data/company_scan_state.json"
      - "launchlist-fortune500-snapshot-fix/feed.xml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    defaults:
      run:
        working-directory: launchlist-fortune500-snapshot-fix

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: launchlist-fortune500-snapshot-fix/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test eligibility and queue rules
        run: python -m unittest discover -s tests

      - name: Refresh official postings
        env:
          FULL_SWEEP: ${{ inputs.full_sweep }}
        run: |
          if [ "$FULL_SWEEP" = "true" ]; then
            python scripts/update_jobs.py --full-sweep
          else
            python scripts/update_jobs.py
          fi

      - name: Commit refreshed directory, scan state, and postings
        run: |
          git config user.name "launchlist-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/opportunities.json
          git add data/fortune500_companies.json
          git add data/company_scan_state.json
          git add feed.xml
          git diff --cached --quiet || git commit -m "chore: refresh Fortune 500 internship scan"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload website
        uses: actions/upload-pages-artifact@v3
        with:
          path: launchlist-fortune500-snapshot-fix

      - name: Deploy website
        uses: actions/deploy-pages@v4

  notify-failure:
    needs: refresh
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - run: echo "The LaunchList refresh failed. Review the Actions log."
